$schema: 'https://json-schema.org/draft/2020-12/schema'
type: object
required:
  - test_name
  - iterations
  - results
  - statistics
  - target_ms
  - passed
  - environment
  - timestamp
properties:
  test_name:
    type: string
    description: 'Benchmark identifier (e.g., workspace_creation, service_creation, combined)'
    examples:
      - 'workspace_and_service_creation'
  iterations:
    type: integer
    minimum: 1
    description: 'Number of benchmark iterations performed'
  results:
    type: array
    items:
      type: object
      properties:
        iteration:
          type: integer
          minimum: 1
        duration_ms:
          type: integer
          minimum: 0
          description: 'Wall-clock time in milliseconds'
  statistics:
    type: object
    required:
      - median_ms
      - p95_ms
      - min_ms
      - max_ms
      - mean_ms
    properties:
      median_ms:
        type: integer
        description: '50th percentile duration'
      p95_ms:
        type: integer
        description: '95th percentile duration'
      min_ms:
        type: integer
        description: 'Fastest iteration'
      max_ms:
        type: integer
        description: 'Slowest iteration'
      mean_ms:
        type: integer
        description: 'Arithmetic mean duration'
  target_ms:
    type: integer
    description: 'Performance target in milliseconds (1000ms for SC-001)'
  passed:
    type: boolean
    description: 'Whether p95_ms <= target_ms'
  environment:
    type: object
    required:
      - cpu_cores
      - ram_mb
      - os
      - cli_version
    properties:
      cpu_cores:
        type: integer
        minimum: 1
      ram_mb:
        type: integer
        minimum: 1
      os:
        type: string
        description: 'Operating system identifier'
        examples:
          - 'linux-x86_64'
          - 'darwin-arm64'
      disk_type:
        type: string
        enum: ['ssd', 'hdd', 'nvme', 'unknown']
      cli_version:
        type: string
        description: 'nfw CLI version string'
  timestamp:
    type: string
    format: date-time
    description: 'ISO 8601 timestamp of benchmark execution'
