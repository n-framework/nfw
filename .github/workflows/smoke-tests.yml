name: Smoke Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build CLI
        run: make build

      - name: Cache templates
        uses: actions/cache@v4
        with:
          path: ~/.cache/nfw/templates
          key: nfw-templates-${{ hashFiles('../src/nfw-templates/**') }}

      - name: Run smoke tests
        run: make smoke-tests

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: tests/smoke/*.log
