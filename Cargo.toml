[workspace]
resolver = "2"
members = [
  "src/nframework-nfw/core/nframework-nfw-domain",
  "src/nframework-nfw/core/nframework-nfw-application",
  "src/nframework-nfw/infrastructure/nframework-nfw-infrastructure-filesystem",
  "src/nframework-nfw/infrastructure/nframework-nfw-infrastructure-git",
  "src/nframework-nfw/infrastructure/nframework-nfw-infrastructure-workspace-metadata",
  "src/nframework-nfw/infrastructure/nframework-nfw-infrastructure-yaml",
  "src/nframework-nfw/infrastructure/nframework-nfw-infrastructure-versioning",
  "src/nframework-nfw/presentation/nframework-nfw-cli",
]

[workspace.dependencies]
nframework-core-cli-abstraction = { path = "packages/nframework-core-cli/src/nframework-core-cli-abstraction" }
nframework-core-cli-clap = { path = "packages/nframework-core-cli/src/nframework-core-cli-clap" }
nframework-core-cli-inquire = { path = "packages/nframework-core-cli/src/nframework-core-cli-inquire" }
core-template-rust = { path = "../core-template-rust" }
